<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | Sound of Smiles</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sunshine: #FFD93D; --coral: #FF8B7B; --blush: #FFB5C2;
            --peach: #FFEAA7; --cream: #FFF9F0; --warm-gray: #6B5B5B;
            --soft-shadow: rgba(255, 139, 123, 0.2);
        }
        body { font-family: 'Quicksand', sans-serif; background: var(--cream); min-height: 100vh; color: var(--warm-gray); }
        header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 3rem; background: linear-gradient(135deg, var(--peach) 0%, var(--cream) 100%); box-shadow: 0 2px 20px var(--soft-shadow); position: sticky; top: 0; z-index: 100; }
        .logo-container { display: flex; align-items: center; gap: 1rem; }
        .logo-container a { display: flex; align-items: center; gap: 1rem; text-decoration: none; }
        .logo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; box-shadow: 0 4px 15px var(--soft-shadow); }
        .brand-name { font-family: 'Playfair Display', serif; font-size: 1.5rem; background: linear-gradient(135deg, var(--coral), #E17055); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        nav ul { display: flex; list-style: none; gap: 2.5rem; }
        nav a { text-decoration: none; color: var(--warm-gray); font-weight: 600; font-size: 0.95rem; position: relative; padding: 0.5rem 0; transition: color 0.3s ease; }
        nav a::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 2px; background: linear-gradient(90deg, var(--sunshine), var(--coral)); transition: width 0.3s ease; border-radius: 2px; }
        nav a:hover, nav a.active { color: var(--coral); }
        nav a:hover::after, nav a.active::after { width: 100%; }
        main { padding: 4rem 3rem; max-width: 900px; margin: 0 auto; }
        .page-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; text-align: center; margin-bottom: 2rem; background: linear-gradient(135deg, var(--sunshine) 0%, var(--coral) 50%, var(--blush) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .event-card { background: white; border-radius: 20px; padding: 2rem; box-shadow: 0 10px 40px rgba(107, 91, 91, 0.08); border: 1px solid rgba(255, 181, 194, 0.2); margin-bottom: 1.5rem; display: flex; gap: 1.5rem; transition: transform 0.3s ease; animation: fadeUp 0.4s ease both; }
        .event-card:hover { transform: translateY(-5px); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .event-date { background: linear-gradient(135deg, var(--sunshine), var(--coral)); border-radius: 15px; padding: 1rem; text-align: center; min-width: 80px; color: white; flex-shrink: 0; }
        .event-date.past { background: linear-gradient(135deg, #C8C0BA, #A89F99); }
        .event-date .month { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }
        .event-date .day { font-size: 2rem; font-weight: 700; line-height: 1; }
        .event-details h3 { font-size: 1.3rem; margin-bottom: 0.5rem; color: var(--warm-gray); }
        .event-details .time { color: var(--coral); font-weight: 600; margin-bottom: 0.5rem; }
        .event-details p { line-height: 1.6; color: #8B7B7B; }
        .section-label { font-size: 1.2rem; color: var(--coral); margin: 2.5rem 0 1.5rem; font-weight: 600; }
        .divider { border: none; border-top: 2px solid rgba(255, 181, 194, 0.3); margin: 3rem 0; }
        .empty-message { text-align: center; color: #A89F99; font-style: italic; padding: 2rem 0; }
        footer { background: linear-gradient(135deg, var(--warm-gray), #5B4B4B); color: var(--cream); padding: 3rem; text-align: center; position: relative; }
        footer p { opacity: 0.9; }
        .social-links { display: flex; justify-content: center; gap: 1.5rem; margin-top: 1.5rem; }
        .social-links a { width: 45px; height: 45px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.2rem; transition: background 0.3s ease, transform 0.3s ease; color: var(--cream); }
        .social-links a:hover { background: linear-gradient(135deg, var(--sunshine), var(--coral)); transform: scale(1.1); }
        .admin-login { display: inline-flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--coral), var(--blush)); color: white; text-decoration: none; font-size: 0.78rem; font-weight: 600; padding: 0.45rem 0.9rem; border-radius: 999px; box-shadow: 0 6px 18px rgba(107, 91, 91, 0.18); transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .admin-login:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(255, 139, 123, 0.3); }
        .footer-actions { position: absolute; right: 3rem; top: 50%; transform: translateY(-50%); }

        /* Loading spinner */
        .loading-row {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; padding: 1.5rem 0; color: #A89F99; font-size: 0.9rem;
        }
        .mini-spin {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,139,123,0.25);
            border-top-color: var(--coral);
            border-radius: 50%; animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) { header { padding: 1rem 1.5rem; flex-direction: column; gap: 1rem; } nav ul { gap: 1.5rem; } main { padding: 2rem 1.5rem; } .page-title { font-size: 2rem; } .event-card { flex-direction: column; } }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <a href="index.html">
                <img src="logo.png" alt="Sound of Smiles Logo" class="logo">
                <span class="brand-name">Sound of Smiles</span>
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="events.html" class="active">Events</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="join.html">Join Us</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 class="page-title">Upcoming Events</h1>
        <div id="upcoming-events">
            <div class="loading-row" id="loader">
                <div class="mini-spin"></div> Loading events…
            </div>
        </div>

        <hr class="divider">

        <h2 class="page-title">Past Events</h2>
        <div id="past-events"></div>
    </main>

    <footer>
        <p>Sound of Smiles | Aliso Niguel High School</p>
        <div class="footer-actions">
            <a class="admin-login" href="login.html" aria-label="Admin login">Admin Login</a>
        </div>
    </footer>

    <script>
        // ── Supabase config ──
        const SUPABASE_URL  = 'https://zylxzefhjqcnbjxiquad.supabase.co';
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5bHh6ZWZoanFjbmJqeGlxdWFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA0OTUwMjksImV4cCI6MjA4NjA3MTAyOX0.SETNMm4NpvoOvnMy9kDuSfZHdsEoANe-lt8UkIUtSu8';
        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    
        // ── Helpers ──
        const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

        function fmtTime(t) {
            if (!t) return null;
            const [h, m] = t.split(':');
            const hr = parseInt(h);
            return `${hr > 12 ? hr - 12 : hr || 12}:${m} ${hr >= 12 ? 'PM' : 'AM'}`;
        }

        function buildCard(event, isPast) {
            const d = new Date(event.date + 'T00:00:00');
            const month = MONTHS[d.getMonth()];
            const day   = d.getDate();

            // format time — could be "2:00 PM" from hardcoded or "14:00" from Supabase
            let timeDisplay = '';
            if (event.time) {
                // if it looks like HH:MM (Supabase format), convert it
                timeDisplay = /^\d{1,2}:\d{2}$/.test(event.time) ? fmtTime(event.time) : event.time;
            }

            const card = document.createElement('div');
            card.className = 'event-card';
            card.setAttribute('data-date', event.date);
            card.innerHTML = `
                <div class="event-date${isPast ? ' past' : ''}">
                    <div class="month">${month}</div>
                    <div class="day">${day}</div>
                </div>
                <div class="event-details">
                    <h3>${event.name}</h3>
                    ${timeDisplay ? `<div class="time">${timeDisplay}</div>` : ''}
                    ${event.notes ? `<p>${event.notes}</p>` : ''}
                </div>
            `;
            return card;
        }

        // ── Main render function ──
        async function loadEvents() {
            const upcomingEl = document.getElementById('upcoming-events');
            const pastEl     = document.getElementById('past-events');

            // Fetch from Supabase
            let dbEvents = [];
            try {
                const { data, error } = await sb.from('events').select('*');
                if (!error && data) dbEvents = data;
            } catch (e) {
                console.warn('Could not load events from database:', e);
            }

            // Use only dbEvents now (no hardcoded events)
            const all = [...dbEvents];

            // Sort by date ascending
            all.sort((a, b) => new Date(a.date) - new Date(b.date));

            // Split into upcoming / past
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const upcoming = all.filter(e => new Date(e.date + 'T00:00:00') >= today);
            const past     = all.filter(e => new Date(e.date + 'T00:00:00') <  today);

            // Remove loader
            upcomingEl.innerHTML = '';

            // Render upcoming
            if (upcoming.length === 0) {
                upcomingEl.innerHTML = '<p class="section-label">More events coming soon!</p>';
            } else {
                upcoming.forEach((ev, i) => {
                    const card = buildCard(ev, false);
                    card.style.animationDelay = `${i * 0.07}s`;
                    upcomingEl.appendChild(card);
                });
                upcomingEl.innerHTML += '<p class="section-label">More events coming soon!</p>';
            }

            // Render past
            if (past.length === 0) {
                pastEl.innerHTML = '<p class="empty-message">No past events yet!</p>';
            } else {
                // show most recent first in the past section
                past.reverse().forEach((ev, i) => {
                    const card = buildCard(ev, true);
                    card.style.animationDelay = `${i * 0.05}s`;
                    pastEl.appendChild(card);
                });
            }
        }

        loadEvents();
    </script>
</body>
</html>
