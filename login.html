<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sound of Smiles — Sign In</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:wght@500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sunshine: #FFD93D;
      --coral: #FF8B7B;
      --blush: #FFB5C2;
      --peach: #FFEAA7;
      --cream: #FFF9F0;
      --warm-gray: #6B5B5B;
      --soft-shadow: rgba(255, 139, 123, 0.2);

      --bg:      var(--cream);
      --surface: #ffffff;
      --warm:    var(--peach);
      --gold:    var(--coral);
      --gold-2:  #E17055;
      --rose:    #E17055;
      --text:    var(--warm-gray);
      --text-2:  #7B6B6B;
      --text-3:  #9B8B8B;
      --border:  rgba(255, 181, 194, 0.35);
    }

    /* FIX 1: html+body fill full height so footer sticks to bottom, no gap */
    html, body { height: 100%; }

    body {
      font-family: 'Quicksand', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 3rem;
      background: linear-gradient(135deg, var(--peach) 0%, var(--cream) 100%);
      box-shadow: 0 2px 20px var(--soft-shadow);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-container a {
      display: flex;
      align-items: center;
      gap: 1rem;
      text-decoration: none;
    }

    .logo {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 4px 15px var(--soft-shadow);
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      background: linear-gradient(135deg, var(--coral), #E17055);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 2.5rem;
    }

    nav a {
      text-decoration: none;
      color: var(--warm-gray);
      font-weight: 600;
      font-size: 0.95rem;
      position: relative;
      padding: 0.5rem 0;
      transition: color 0.3s ease;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--sunshine), var(--coral));
      transition: width 0.3s ease;
      border-radius: 2px;
    }

    nav a:hover {
      color: var(--coral);
    }

    nav a:hover::after {
      width: 100%;
    }

    /* FIX 2: main grows to fill space between header and footer */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2.5rem 1.5rem 3.5rem;
      position: relative;
      z-index: 1;
    }

    /* ── Card ── */
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 430px;
      margin: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 60px 52px 52px;
      box-shadow:
        0 2px 0 rgba(255,255,255,0.8) inset,
        0 20px 60px rgba(35,26,18,0.1),
        0 4px 12px rgba(35,26,18,0.06);
      animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Brand ── */
    .brand {
      text-align: center;
      margin-bottom: 48px;
    }

    .brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      animation: cardIn 0.7s 0.15s cubic-bezier(0.16,1,0.3,1) both;
    }

    .brand-sub {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 4px 14px;
      background: var(--warm);
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      animation: cardIn 0.7s 0.2s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* ── Form ── */
    .field {
      margin-bottom: 20px;
      animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
    }

    .field:nth-child(1) { animation-delay: 0.22s; }
    .field:nth-child(2) { animation-delay: 0.28s; }

    .field label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 9px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 15px; top: 50%;
      transform: translateY(-50%);
      font-size: 0.95rem;
      pointer-events: none;
      opacity: 0.5;
    }

    .field input {
      width: 100%;
      padding: 13px 16px 13px 42px;
      border: 1.5px solid var(--border);
      border-radius: 13px;
      background: var(--warm);
      font-family: 'Quicksand', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.22s, background 0.22s, box-shadow 0.22s;
    }

    .field input::placeholder { color: var(--text-3); }

    .field input:focus {
      border-color: var(--gold);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255,139,123,0.1);
    }

    /* ── Submit ── */
    .submit-wrap {
      margin-top: 10px;
      animation: cardIn 0.7s 0.34s cubic-bezier(0.16,1,0.3,1) both;
    }

    .submit-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--coral) 0%, var(--blush) 100%);
      color: white;
      border: none;
      border-radius: 13px;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.02em;
      position: relative;
      overflow: hidden;
      transition: opacity 0.2s, transform 0.18s, box-shadow 0.2s;
      box-shadow: 0 5px 20px rgba(255,139,123,0.38);
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      border-radius: inherit;
    }

    .submit-btn:hover:not(:disabled) {
      opacity: 0.92;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(255,139,123,0.48);
    }

    .submit-btn:active:not(:disabled) { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-inner {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      position: relative; z-index: 1;
    }

    /* ── Error ── */
    .error-box {
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(201,104,90,0.08);
      border: 1px solid rgba(201,104,90,0.22);
      border-radius: 11px;
      color: var(--rose);
      font-size: 0.85rem;
      display: none;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .back-link {
      text-align: center;
      margin-top: 24px;
      animation: cardIn 0.7s 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }

    .back-link a {
      font-size: 0.8rem;
      color: var(--text-3);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link a:hover { color: var(--gold); }

    /* FIX 3: footer flex-shrink so it never leaves a gap */
    footer {
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--warm-gray), #5B4B4B);
      color: var(--cream);
      padding: 3rem;
      text-align: center;
      position: relative;
    }

    footer p { opacity: 0.9; }

    .admin-login {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--coral), var(--blush));
      color: white;
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      box-shadow: 0 6px 18px rgba(107, 91, 91, 0.18);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .admin-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(255, 139, 123, 0.3);
    }

    .footer-actions {
      position: absolute;
      right: 3rem;
      top: 50%;
      transform: translateY(-50%);
    }

    @media (max-width: 900px) {
      header {
        padding: 1rem 1.5rem;
        flex-direction: column;
        gap: 1rem;
      }

      nav ul {
        gap: 1.5rem;
        flex-wrap: wrap;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <a href="index.html">
        <img src="logo.png" alt="Sound of Smiles Logo" class="logo">
        <span class="brand-name">Sound of Smiles</span>
      </a>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="join.html">Join Us</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="card">
      <div class="brand">
        <h1>Sound of Smiles</h1>
        <div class="brand-sub">Admin Portal</div>
      </div>

      <div class="field">
        <label>Email Address</label>
        <div class="input-wrap">
          <span class="input-icon" style="color:var(--coral)">✉</span>
          <input type="email" id="email" placeholder="admin@soundofsmiles.org" autocomplete="email"/>
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon" style="color:var(--coral)">🔒</span>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        </div>
      </div>

      <div class="submit-wrap">
        <button class="submit-btn" id="signin-btn" onclick="signIn()">
          <div class="btn-inner" id="btn-inner">Sign In</div>
        </button>
        <div class="error-box" id="error-box"></div>
      </div>

      <div class="back-link">
        <a href="index.html">← Back to homepage</a>
      </div>
    </div>
  </main>

  <footer>
    <p>Sound of Smiles | Aliso Niguel High School</p>
    <div class="footer-actions">
      <a class="admin-login" href="login.html" aria-label="Admin login">Admin Login</a>
    </div>
  </footer>

  <script>
    const SUPABASE_URL  = 'https://zylxzefhjqcnbjxiquad.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5bHh6ZWZoanFjbmJqeGlxdWFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA0OTUwMjksImV4cCI6MjA4NjA3MTAyOX0.SETNMm4NpvoOvnMy9kDuSfZHdsEoANe-lt8UkIUtSu8';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) window.location.href = 'dashboard.html';
    })();

    async function signIn() {
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value;
      const btn   = document.getElementById('signin-btn');
      const inner = document.getElementById('btn-inner');
      const err   = document.getElementById('error-box');

      err.style.display = 'none';
      btn.disabled = true;
      inner.innerHTML = '<div class="spinner"></div> Signing in…';

      const { error } = await sb.auth.signInWithPassword({ email, password: pass });

      if (error) {
        err.textContent = error.message;
        err.style.display = 'block';
        btn.disabled = false;
        inner.textContent = 'Sign In';
      } else {
        inner.innerHTML = '✓ Redirecting…';
        setTimeout(() => window.location.href = 'dashboard.html', 400);
      }
    }

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') signIn();
    });
  </script>
</body>
</html>
